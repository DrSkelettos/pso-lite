<div id="loadingOverlay" class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center" style="background-color: rgba(255, 255, 255, 0.95); z-index: 9999;">
    <div class="text-center">
        <!-- <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Laden...</span>
        </div>
        <h4 class="text-primary">Inhalt wird geladen</h4> -->
    </div>
</div>

<script>
    // Set a 3-second timeout to reload the page if loading doesn't complete
    const loadingTimeout = setTimeout(function() {
        console.warn('Loading timeout reached - reloading page');
        window.location.reload();
    }, 2000);

    // Store timeout ID globally so it can be cleared when loading completes
    window.loadingTimeout = loadingTimeout;

    // Function to hide the loading overlay
    window.hideLoadingOverlay = function() {
        // Clear the timeout
        if (window.loadingTimeout) {
            clearTimeout(window.loadingTimeout);
            window.loadingTimeout = null;
        }
        
        // Remove the overlay
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) {
            overlay.remove();
        }
    };
</script>
